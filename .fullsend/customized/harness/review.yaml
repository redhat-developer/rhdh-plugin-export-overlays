# Override of upstream review harness.
# Adds workspace-review skill for workspace/catalog validation.
# Full file replacement — must include all upstream fields.
agent: agents/review.md
doc: docs/agents/review.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-code:latest
policy: policies/review.yaml

skills:
  - skills/pr-review
  - skills/code-review
  - skills/docs-review
  - skills/workspace-review

pre_script: scripts/pre-review.sh

host_files:
  - src: env/gcp-vertex.env
    dest: /tmp/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/workspace/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /tmp/workspace/.gcp-oidc-token
    optional: true
  - src: env/review.env
    dest: /tmp/workspace/.env.d/review.env
    expand: true
  - src: ${PRIOR_REVIEW_FILE}
    dest: /tmp/workspace/prior-review.txt
    optional: true

validation_loop:
  script: scripts/validate-output-schema.sh
  max_iterations: 2

post_script: scripts/post-review.sh

runner_env:
  REVIEW_TOKEN: "${REVIEW_TOKEN}"
  REPO_FULL_NAME: "${REPO_FULL_NAME}"
  PR_NUMBER: "${PR_NUMBER}"
  GITHUB_PR_URL: "${GITHUB_PR_URL}"
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/review-result.schema.json

timeout_minutes: 20
