version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "api.anthropic.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "*.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/claude"
      - path: "**/node"

  github_api:
    name: github-api
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/gh"
      - path: "**/git"
      - path: "**/node"

  prow_artifacts:
    name: prow-artifacts
    endpoints:
      - host: "prow.ci.openshift.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "gcsweb-ci.apps.ci.l2s4.p1.openshiftapps.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "storage.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/node"
      - path: "**/gcloud"

  jira_api:
    name: jira-api
    endpoints:
      - host: "issues.redhat.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/acli"
      - path: "**/java"
      - path: "**/node"

  package_registries:
    name: package-registries
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "registry.yarnpkg.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/npm"
      - path: "**/npx"
      - path: "**/yarn"
      - path: "**/yarnpkg"
      - path: "**/node"
