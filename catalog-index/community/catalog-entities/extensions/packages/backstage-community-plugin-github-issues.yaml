apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-community-plugin-github-issues
  namespace: rhdh
  title: "GitHub Issues"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/community-plugins/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/community-plugins/tree/main/workspaces/github/plugins/github-issues
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/community-plugins/tree/main/workspaces/github
  tags: []
spec:
  packageName: "@backstage-community/plugin-github-issues"
  # Tag: bs_1.49.4__0.21.0
  dynamicArtifact: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-github-issues@sha256:9264c1b7a4edd224cb8fa1dd8ebddaae7a26958591554a4f184f62607ab570fd"
  version: 0.21.0
  backstage:
    role: frontend-plugin
    supportedVersions: 1.49.4
  author: Red Hat
  support: community
  lifecycle: active
  partOf:
    - github-issues
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            backstage-community.plugin-github-issues:
              mountPoints:
                - mountPoint: entity.page.issues/cards
                  importName: GithubIssuesCard
                  config:
                    layout:
                      gridColumn: 1 / -1
                    if:
                      allOf:
                        - hasAnnotation: github.com/project-slug
