apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: red-hat-developer-hub-backstage-plugin-translations
  namespace: rhdh
  title: Translations
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - title: Source Code
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/translations/plugins/translations
  annotations:
    backstage.io/source-location: url:https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/translations/plugins/translations
  tags: []
spec:
  packageName: "@red-hat-developer-hub/backstage-plugin-translations"
  dynamicArtifact: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-translations:bs_1.52.0__0.4.0
  version: 0.4.0
  backstage:
    role: frontend-plugin
    supportedVersions: 1.52.0
  author: Red Hat
  support: community
  lifecycle: active
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            red-hat-developer-hub.backstage-plugin-translations:
              translationResources:
                - importName: translationsPluginTranslations
                  module: Alpha
                  ref: translationsPluginTranslationRef
              dynamicRoutes:
                - path: /translations
                  importName: TranslationsPage
                  module: Legacy
              mountPoints:
                - mountPoint: application/provider
                  importName: PseudoLocalizationProvider
                  module: Legacy
