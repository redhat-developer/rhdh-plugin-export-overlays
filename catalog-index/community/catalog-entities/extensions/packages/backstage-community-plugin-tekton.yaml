  # Tag: bs_1.52.0__3.39.0
  dynamicArtifact: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton@sha256:932e748db534281902be756efd07c0d88dcb706a589aaab3406f0c24f5692b1d"
