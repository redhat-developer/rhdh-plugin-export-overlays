spec:
  packageName: "@backstage/plugin-catalog-backend-module-msgraph"
  # Tag: bs_1.52.0__0.10.3, Build date: 2026-05-21T21:02:22Z
  dynamicArtifact: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-msgraph@sha256:5f094e313db3def6ccb7d6c115d7b77a33e34dec562f1d8db6aa0db7a3aae7f3"
