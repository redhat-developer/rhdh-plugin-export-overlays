apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: redhat-backstage-plugin-orchestrator
  namespace: rhdh
  title: Orchestrator Frontend
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://issues.redhat.com/browse/RHDHBUGS
      title: "Report issues here. Note: Customers of Red Hat Developer Hub should raise a Red Hat support case instead."
    - title: Source Code
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/orchestrator/plugins/orchestrator
  annotations:
    backstage.io/source-location: url:https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/orchestrator/plugins/orchestrator
  tags:
    - automation
spec:
  packageName: '@red-hat-developer-hub/backstage-plugin-orchestrator'

  # Tag: bs_1.52.0__5.9.3, Build date: 2026-06-02T17:21:47Z
  dynamicArtifact: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-orchestrator@sha256:8dc7ad77f12830914a439e642d89d3776ecfcbfef2cd8f0b00f212786d7d0614"
  version: 5.9.3
  backstage:
    role: frontend-plugin
    supportedVersions: 1.52.0
  author: Red Hat
  support: generally-available
  lifecycle: active
  partOf:
    - orchestrator
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            red-hat-developer-hub.backstage-plugin-orchestrator:
              translationResources:
                - importName: orchestratorTranslations
                  module: Alpha
                  ref: orchestratorTranslationRef
              appIcons:
                - importName: OrchestratorIcon
                  name: orchestratorIcon
              dynamicRoutes:
                - importName: OrchestratorPage
                  menuItem:
                    icon: orchestratorIcon
                    text: Orchestrator
                    textKey: menuItem.orchestrator
                  path: /orchestrator
              menuItems:
                orchestrator:
                  parent: default.admin
                  icon: orchestratorIcon
              entityTabs:
                - path: /workflows
                  title: Workflows
                  titleKey: catalog.entityPage.workflows.title
                  mountPoint: entity.page.workflows
              mountPoints:
                - mountPoint: entity.page.workflows/cards
                  importName: OrchestratorCatalogTab
                  config:
                    layout:
                      gridColumn: 1 / -1
                    if:
                      anyOf:
                        - hasAnnotation: orchestrator.io/workflows
