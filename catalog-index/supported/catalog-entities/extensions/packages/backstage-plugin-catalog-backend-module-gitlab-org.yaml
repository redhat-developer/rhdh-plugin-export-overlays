apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-plugin-catalog-backend-module-gitlab-org
  namespace: rhdh
  title: "Catalog Backend Module GitLab Organization"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/backstage/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/community-plugins/tree/main/workspaces/gitlab
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/community-plugins/tree/main/workspaces/gitlab
  tags:
    - software-catalog
spec:
  packageName: "@backstage/plugin-catalog-backend-module-gitlab-org"
  dynamicArtifact: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-gitlab-org:bs_1.52.0__0.2.22!backstage-plugin-catalog-backend-module-gitlab-org
  version: 0.2.22
  backstage:
    role: backend-plugin-module
    supportedVersions: 1.52.0
  author: Red Hat
  support: generally-available
  lifecycle: active
  partOf:
    - gitlab-org-catalog-integration
  appConfigExamples:
    - title: GitLab org provider (users/groups; requires matching integrations.gitlab host)
      content:
        catalog:
          providers:
            gitlab:
              orgProvider:
                host: ${GITLAB_HOST}
                orgEnabled: true
                group: ${GITLAB_ORG_GROUP}
                schedule:
                  frequency: { minutes: 30 }
                  timeout: { minutes: 3 }
                  initialDelay: { seconds: 15 }
