apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-plugin-techdocs
  namespace: rhdh
  title: TechDocs Frontend
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/backstage/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/backstage/tree/master/plugins/techdocs
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/backstage/tree/master/plugins/techdocs
  tags: []
spec:
  packageName: '@backstage/plugin-techdocs'
  # Tag: bs_1.52.0__1.17.7, Build date: 2026-06-03T21:12:19Z
  dynamicArtifact: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-techdocs@sha256:1518decea78da4aecaf4b1d7b276b0f1b6eb0bd911ad77734eefba13168a993f"
  version: 1.17.7
  backstage:
    role: frontend-plugin
    supportedVersions: 1.52.0
  author: Red Hat
  support: generally-available
  lifecycle: active
  partOf:
    - techdocs
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            backstage.plugin-techdocs:
              routeBindings:
                targets:
                  - importName: techdocsPlugin
                bindings:
                  - bindTarget: catalogPlugin.externalRoutes
                    bindMap:
                      viewTechDoc: techdocsPlugin.routes.docRoot
                  - bindTarget: scaffolderPlugin.externalRoutes
                    bindMap:
                      viewTechDoc: techdocsPlugin.routes.docRoot
              dynamicRoutes:
                - path: /docs
                  importName: TechDocsIndexPage
                  menuItem:
                    icon: docs
                    text: Docs
                    textKey: menuItem.docs
                - path: /docs/:namespace/:kind/:name/*
                  importName: TechDocsReaderPage
              mountPoints:
                - mountPoint: entity.page.docs/cards
                  importName: EntityTechdocsContent
                  config:
                    layout:
                      gridColumn: 1 / -1
                    if:
                      allOf:
                        - isTechDocsAvailable
                - mountPoint: search.page.results
                  importName: TechDocsSearchResultListItem
                - mountPoint: search.page.filters
                  importName: TechdocsSearchFilter
                - mountPoint: search.page.types
                  importName: techdocsSearchType
                  config:
                    props:
                      name: Documentation
                      icon: docs
