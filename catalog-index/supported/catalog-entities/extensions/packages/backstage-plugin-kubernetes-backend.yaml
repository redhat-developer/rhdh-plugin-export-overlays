  appConfigExamples:
    - title: Default configuration
      content:
        kubernetes:
          serviceLocatorMethod:
            type: multiTenant
          clusterLocatorMethods:
            - type: config
              clusters:
                - name: ${K8S_CLUSTER_NAME}
                  url: ${K8S_CLUSTER_URL}
                  authProvider: serviceAccount
                  skipTLSVerify: true
                  serviceAccountToken: ${K8S_CLUSTER_TOKEN}
