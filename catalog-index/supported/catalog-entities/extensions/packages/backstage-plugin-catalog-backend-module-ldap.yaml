apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-plugin-catalog-backend-module-ldap
  namespace: rhdh
  title: Catalog Backend Module LDAP
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/backstage/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/backstage/tree/master/plugins/catalog-backend-module-ldap
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/backstage/tree/master/plugins/catalog-backend-module-ldap
  tags:
    - software-catalog
spec:
  packageName: '@backstage/plugin-catalog-backend-module-ldap'
  # Tag: bs_1.52.0__0.12.6, Build date: 2026-05-21T21:26:30Z
  dynamicArtifact: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-ldap@sha256:b03192c25d21cc9c08f88a3a0e0d5655310d7492ccaf836046def3fb9542b70c"
  version: 0.12.6
  backstage:
    role: backend-plugin-module
    supportedVersions: 1.52.0
  author: Red Hat
  support: generally-available
  lifecycle: active
  partOf:
    - ldap-catalog-integration
  appConfigExamples:
    - title: Default configuration
      content:
        catalog:
          providers:
            ldapOrg:
              default:
                target: ${LDAP_TARGET_URL}
                bind:
                  dn: ${LDAP_BIND_DN}
                  secret: ${LDAP_BIND_SECRET}
                users:
                  - dn: ${LDAP_USERS_DN}
                    options:
                      filter: (uid=*)
                groups:
                  - dn: ${LDAP_GROUPS_DN}
                    options:
                      filter: (cn=*)
                schedule:
                  frequency:
                    minutes: 60
                  initialDelay:
                    seconds: 15
                  timeout:
                    minutes: 15
