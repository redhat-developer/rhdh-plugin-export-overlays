name: Seed E2E coverage to main

# E2E coverage is generated only by the Prow PR e2e jobs (which deploy
# instrumented plugin images built by /publish) and uploaded against PR-head
# commits. Squash-merge creates a fresh main commit that never receives an
# upload, and Codecov carryforward can't cross the squash — so the
# default-branch view stays empty for rolled-out workspaces.
#
# This job re-attributes each committed coverage snapshot
# (coverage-snapshots/<workspace>.lcov) to the current main commit, so the
# Codecov default-branch headline and per-flag trend reflect the workspaces
# already rolled out. It is a bridge until live main-attributed coverage exists
# (see the E2E coverage section in README.md).

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  push:
    branches: [main]
    paths:
      - "coverage-snapshots/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    name: Upload coverage snapshots to the current main commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Seed coverage snapshots
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: ./scripts/seed-main-coverage.sh
