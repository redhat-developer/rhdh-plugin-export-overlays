name: E2E Coverage on PR Checks

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number'
        type: string
        required: true
      overlay-commit:
        description: 'PR commit SHA'
        type: string
        required: true
      overlay-repo:
        description: 'PR repository (e.g., user/repo)'
        type: string
        required: true
      overlay-branch:
        description: 'PR branch'
        type: string
        required: true
      target-branch:
        description: 'Target branch (main or release-*)'
        type: string
        required: true
      workspace:
        description: 'Specific workspace (leave empty for auto-detect)'
        type: string
        required: false

concurrency:
  group: e2e-coverage-pr-${{ inputs.pr-number }}
  cancel-in-progress: true

env:
  CI: "true"
  E2E_COLLECT_COVERAGE: "1"
  INSTALLATION_METHOD: helm

jobs:
  detect-workspaces:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.overlay-commit }}

      - name: Detect workspaces with E2E tests and published PR images
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.repository }}
          INPUT_WORKSPACE: ${{ inputs.workspace }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          CANDIDATES=()

          if [[ -n "$INPUT_WORKSPACE" ]]; then
            if [[ ! "$INPUT_WORKSPACE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "ERROR: Invalid workspace name: $INPUT_WORKSPACE" >&2
              exit 1
            fi
            CANDIDATES=("$INPUT_WORKSPACE")
          else
            for dir in workspaces/*/e2e-tests; do
              [[ -d "$dir" ]] || continue
              WS=$(echo "$dir" | cut -d'/' -f2)
              CANDIDATES+=("$WS")
            done
          fi

          # Filter: workspace must have metadata with a frontend plugin AND
          # a corresponding PR-built OCI image in GHCR
          VALID=()
          for ws in "${CANDIDATES[@]}"; do
            [[ -d "workspaces/$ws/e2e-tests" ]] || continue
            [[ -d "workspaces/$ws/metadata" ]] || continue

            # Find the frontend plugin OCI reference
            IMAGE_NAME=""
            IMAGE_TAG=""
            for meta_file in "workspaces/${ws}/metadata"/*.yaml; do
              [ -e "$meta_file" ] || continue
              ROLE=$(yq -r '.spec.backstage.role // ""' "$meta_file")
              [[ "$ROLE" == "frontend-plugin" ]] || continue

              ARTIFACT=$(yq -r '.spec.dynamicArtifact // ""' "$meta_file")
              [[ -n "$ARTIFACT" && "$ARTIFACT" != "null" && "$ARTIFACT" =~ ^oci:// ]] || continue

              # Extract image name and tag
              REF="${ARTIFACT#oci://}"
              REF="${REF%%!*}"
              IMAGE_NAME=$(basename "${REF%%:*}")
              BASE_TAG="${REF##*:}"

              # Convert to PR tag: bs_X.Y.Z__V.E.R -> pr_NUMBER__V.E.R
              if [[ "$BASE_TAG" =~ ^bs_[0-9]+\.[0-9]+\.[0-9]+__(.+)$ ]]; then
                PLUGIN_VERSION="${BASH_REMATCH[1]}"
                IMAGE_TAG="pr_${PR_NUMBER}__${PLUGIN_VERSION}"
              else
                echo "  $ws — Cannot parse version from tag: $BASE_TAG, skipping"
                continue
              fi

              break
            done

            [[ -n "$IMAGE_NAME" ]] || continue

            # Check if PR-built production image exists
            PACKAGE_PATH="${GITHUB_REPO}/${IMAGE_NAME}"
            PACKAGE_PATH_ENCODED=$(echo "$PACKAGE_PATH" | sed 's|/|%2F|g')

            EXISTS=$(gh api "/orgs/${REPO_OWNER}/packages/container/${PACKAGE_PATH_ENCODED}/versions" \
              --jq "[.[] | select(.metadata.container.tags[] == \"$IMAGE_TAG\")] | length" 2>/dev/null || echo "0")

            if [[ "$EXISTS" -gt 0 ]]; then
              VALID+=("$ws")
              echo "  $ws — PR image exists ($IMAGE_NAME:$IMAGE_TAG)"
            else
              echo "  $ws — PR image not found, skipping (run /publish first)"
            fi
          done

          if [[ ${#VALID[@]} -eq 0 ]]; then
            echo "No workspaces with PR-built images found"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${VALID[@]}" | jq -R . | jq -sc .)
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "Workspaces with PR images: ${VALID[*]}"
          fi

  add_no_images_comment:
    needs: detect-workspaces
    if: needs.detect-workspaces.outputs.matrix == '[]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment that no workspaces were found
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const body = `### ⚠️  E2E Coverage Tests Skipped

            No workspaces found with both:
            - E2E test suite (\`workspaces/*/e2e-tests/\`)
            - PR-built plugin images in GHCR (\`pr_${{ inputs.pr-number }}__*\`)

            **Possible reasons:**
            1. You haven't run \`/publish\` yet → Images don't exist
            2. This PR doesn't modify any workspace with E2E tests
            3. PR images exist but workspace has no \`e2e-tests/\` directory

            **If you need coverage:**
            1. Make sure your PR modifies a workspace that has \`e2e-tests/\`
            2. Comment \`/publish\` to build the plugin images
            3. Wait for publish to complete successfully
            4. Then comment \`/test e2e-ocp-helm\``;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: ${{ inputs.pr-number }},
              body
            });

  build-instrumented:
    needs: detect-workspaces
    if: needs.detect-workspaces.outputs.matrix != '[]'
    strategy:
      matrix:
        workspace: ${{ fromJson(needs.detect-workspaces.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/build-instrumented-plugins.yaml
    with:
      workspace: ${{ matrix.workspace }}
      pr-number: ${{ inputs.pr-number }}
    secrets: inherit

  e2e-test-with-coverage:
    needs: [detect-workspaces, build-instrumented]
    if: needs.detect-workspaces.outputs.matrix != '[]'
    strategy:
      matrix:
        workspace: ${{ fromJson(needs.detect-workspaces.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
      issues: write
    env:
      GIT_PR_NUMBER: ${{ inputs.pr-number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.overlay-commit }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Run E2E tests with coverage
        env:
          WORKSPACE: ${{ matrix.workspace }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: ./run-e2e.sh -w "$WORKSPACE"

      - name: Upload coverage to Codecov
        if: always()
        env:
          WORKSPACE: ${{ matrix.workspace }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -f "coverage/lcov.info" ]]; then
            ./scripts/report-coverage.sh "$WORKSPACE"
          else
            echo "⚠️  No coverage data generated for $WORKSPACE"
            echo "This may happen if e2e-test-utils PR #95 hasn't landed yet."
            echo "Tests ran successfully but coverage collection requires the image swap feature."
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: e2e-report-${{ matrix.workspace }}-pr${{ inputs.pr-number }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          WORKSPACE: ${{ matrix.workspace }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const workspace = process.env.WORKSPACE;
            const runUrl = process.env.RUN_URL;
            const hasCoverage = require('fs').existsSync('coverage/lcov.info');

            let body = `### E2E Tests: **${workspace}**\n\n`;

            if (hasCoverage) {
              body += `✅ Tests completed with coverage\n\n`;
              body += `Coverage uploaded to Codecov with flag \`e2e-${workspace}\`\n\n`;
            } else {
              body += `✅ Tests completed\n\n`;
              body += `⚠️  No coverage data collected (waiting for [e2e-test-utils PR #95](https://github.com/redhat-developer/rhdh-e2e-test-utils/pull/95))\n\n`;
            }

            body += `[View test report](${runUrl})`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: ${{ inputs.pr-number }},
              body
            });
