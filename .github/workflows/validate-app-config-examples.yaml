name: Validate appConfigExamples

on:
  pull_request:
    branches:
      - main
      - 'release-*'
    paths:
      - 'workspaces/**/metadata/**'
      - 'scripts/validate-app-config-examples.py'
      - '.github/workflows/validate-app-config-examples.yaml'
  workflow_dispatch:

concurrency:
  group: validate-app-config-examples-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: appConfigExamples coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate (full tree)
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/validate-app-config-examples.py

      - name: Validate (PR — changed metadata only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python scripts/validate-app-config-examples.py --since "$BASE_SHA"
