name: Pull Request Actions
on:
  issue_comment:
    types: [created, edited]
  workflow_call:
    inputs:
      pr-number:
        type: number
        required: true
      command:
        type: string
        required: true

jobs:  
  parse:
    runs-on: ubuntu-latest
    name: Parse PR Comment
    if: >
      github.triggering_actor != 'openshift-ci[bot]' &&
      github.triggering_actor != 'sonarqubecloud[bot]' &&
      github.event.issue.pull_request && (
      contains(github.event.comment.body, '/publish') ||
      contains(github.event.comment.body, '/update-versions') ||
      contains(github.event.comment.body, '/update-commit') ||
      contains(github.event.comment.body, '/smoketest'))
    
    outputs:
      command-name: ${{ steps.extract.outputs.command-name }}
      error-message: ${{ steps.extract.outputs.error-message }}
    steps:
      - name: Extract command from comment
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const raw = context.payload.comment?.body ?? '';
            const lines = String(raw)
              .split(/\r?\n/)
              .map(l => l.trim())
              .filter(l => l.length > 0);
            const allowed = new Set(['/publish', '/update-versions', '/update-commit', '/smoketest']);
            const matchingCommands = lines.filter(l => allowed.has(l));
            
            if (matchingCommands.length > 1) {
              const errorMsg = `Multiple commands found in comment: ${matchingCommands.join(', ')}. Please use only one command per comment.`;
              core.setOutput('error-message', errorMsg);
              core.setOutput('command-name', '');
              core.setFailed(errorMsg);
              return;
            }
            if (matchingCommands.length === 0) {
              core.notice('No command found in comment – cancelling workflow run');
              await github.rest.actions.cancelWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              return;
            }
            
            const firstMatching = matchingCommands[0] || '';
            core.setOutput('command-name', firstMatching.startsWith('/') ? firstMatching.slice(1) : firstMatching);
            core.setOutput('error-message', '');

  add_error_comment:
    needs:
      - parse

    concurrency:
      group: add_error_comment-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false

    permissions:
      pull-requests: write

    if: always() && needs.parse.outputs.error-message != ''
    runs-on: ubuntu-latest
    steps:
      - name: Add error comment
        uses: actions/github-script@v7
        env:
          INPUT_ERROR_MESSAGE: ${{ needs.parse.outputs.error-message }}
          INPUT_PR_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const errorMessage = core.getInput('error_message');
            const prNumber = Number(core.getInput('pr_number'));
            const body = `**Error**: ${errorMessage}\n\nValid commands are:\n- \`/publish\` - Publish dynamic plugin images\n- \`/update-versions\` - Update versions from release branch\n- \`/update-commit\` - Update commit from automatic discovery\n- \`/smoketest\` - Run smoke tests`;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  route:
    runs-on: ubuntu-latest
    name: Route Command
    needs:
      - parse
    if: always()
    outputs:
      command: ${{ steps.resolve.outputs.command }}
      pr-number: ${{ steps.resolve.outputs.pr-number }}
    steps:
      - name: Resolve trigger inputs
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            echo "command=${{ needs.parse.outputs.command-name }}" >> $GITHUB_OUTPUT
            echo "pr-number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          else
            echo "command=${{ inputs.command }}" >> $GITHUB_OUTPUT
            echo "pr-number=${{ inputs.pr-number }}" >> $GITHUB_OUTPUT
          fi

  prepare:
    runs-on: ubuntu-latest
    name: Prepare
    needs:
      - route

    concurrency:
      group: prepare-${{ github.ref_name }}-${{ needs.route.outputs.pr-number }}
      cancel-in-progress: false
      
    if: needs.route.outputs.command != ''
    outputs:
      target-branch: ${{ steps.get-branch.outputs.target-branch }}
      overlay-branch: ${{ steps.get-branch.outputs.overlay-branch }}
      overlay-repo: ${{ steps.get-branch.outputs.overlay-repo }}
      overlay-commit: ${{ steps.get-branch.outputs.overlay-commit }}
      workspace: ${{ steps.get-branch.outputs.workspace }}
      pr-number: ${{ steps.get-branch.outputs.pr-number }}

    permissions:
      statuses: write

    steps:
      - name: Get PR branch data
        id: get-branch
        uses: actions/github-script@v7
        env:
          INPUT_COMMAND_NAME: ${{ needs.route.outputs.command }}
          INPUT_PR_NUMBER: ${{ needs.route.outputs.pr-number }}
        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const currentPullRequest = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const targetBranch = currentPullRequest.data.base.ref;
            core.setOutput('target-branch', targetBranch);
            const prBranch = currentPullRequest.data.head.ref;
            core.setOutput('overlay-branch', prBranch);
            const prRepo = currentPullRequest.data.head.repo.full_name;
            core.setOutput('overlay-repo', prRepo);
            core.setOutput('pr-number', prNumber);
            const prCommit = currentPullRequest.data.head.sha;
            core.setOutput('overlay-commit', prCommit);
            let workspace = '';

            const matches = prBranch.match(/^workspaces\/release-.+__(.+)$/);
            if (matches && matches.length == 2) {
              workspace = `workspaces/${matches[1]}`;
            } else {
              const prFiles = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              const workspaces = [ ... new Set(prFiles.data
                .map(f => f.filename.match(/^workspaces\/([^\/]+)\/.*/))
                .filter(match => match)
                .map(match => match[1])
              )];
              if (workspaces.length === 1) {
                workspace =`workspaces/${workspaces[0]}`;
              }
            }
            core.setOutput('workspace', workspace);
            if (workspace === '') {
              return;
            }

            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}',
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: prCommit,
              description: '${{ github.workflow }}',
              state: 'pending',
              target_url: workflowRun.data.html_url,
              context: core.getInput('command_name')
            });
            
  detectChanges:
    name: Detect change scope
    needs:
      - route
      - prepare

    if: needs.route.outputs.command == 'publish' && needs.prepare.outputs.workspace != ''
    runs-on: ubuntu-latest
    outputs:
      only-metadata-changed: ${{ steps.check.outputs.only-metadata-changed }}
    steps:
      - name: Check if only metadata files changed
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          INPUT_WORKSPACE: ${{ needs.prepare.outputs.workspace }}
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const prFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const workspace = core.getInput('workspace');
            const metadataPrefix = `${workspace}/metadata/`;
            const onlyMetadata = prFiles.data.length > 0 &&
              prFiles.data.every(f => f.filename.startsWith(metadataPrefix));
            core.setOutput('only-metadata-changed', String(onlyMetadata));
            core.info(`Only metadata changed: ${onlyMetadata}`);
            if (onlyMetadata) {
              core.info('Build will be skipped - only metadata files were modified.');
            }

  export:
    name: Publish PR Dynamic Plugin Images
    needs:
      - route
      - prepare
      - checkPRUpToDate
      - detectChanges

    concurrency:
      group: export-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: true

    if: | 
      needs.route.outputs.command == 'publish' && 
      needs.prepare.outputs.overlay-branch != '' && 
      needs.prepare.outputs.workspace != '' && 
      needs.detectChanges.outputs.only-metadata-changed != 'true'

    uses: redhat-developer/rhdh-plugin-export-utils/.github/workflows/export-workspaces-as-dynamic.yaml@main
    with:
      overlay-branch: ${{ needs.prepare.outputs.overlay-branch }}
      overlay-repo: ${{ needs.prepare.outputs.overlay-repo }}
      workspace-path: ${{ needs.prepare.outputs.workspace }}
      publish-container: true
      image-repository-prefix: ${{ format('ghcr.io/{0}', github.repository) }}
      image-tag-prefix: ${{ format('pr_{0}__', needs.prepare.outputs.pr-number) }}
      image-registry-user: ${{ github.actor }}

    secrets:
      image-registry-password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write
      attestations: write
      packages: write
      id-token: write

  uploadArtifacts:
    name: Upload Artifacts
    needs:
      - route
      - prepare
      - export
    if: always() && needs.prepare.outputs.overlay-branch != '' && needs.prepare.outputs.pr-number != ''

    concurrency:
      group: uploadArtifacts-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false

    runs-on: ubuntu-latest
    steps:
      - name: Create meta.json with workspace and PR information
        env:
          WORKSPACE: ${{ needs.prepare.outputs.workspace }}
          OVERLAY_BRANCH: ${{ needs.prepare.outputs.overlay-branch }}
          OVERLAY_REPO: ${{ needs.prepare.outputs.overlay-repo }}
          OVERLAY_COMMIT: ${{ needs.prepare.outputs.overlay-commit }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
          TARGET_BRANCH: ${{ needs.prepare.outputs.target-branch }}
        run: |
          mkdir -p context
          cat > context/meta.json <<EOF
          {"workspace":"${WORKSPACE}","overlayBranch":"${OVERLAY_BRANCH}","overlayRepo":"${OVERLAY_REPO}","overlayCommit":"${OVERLAY_COMMIT}","pr":${PR_NUMBER},"targetBranch":"${TARGET_BRANCH}"}
          EOF

      - name: Stage published exports content
        if: | 
          needs.route.outputs.command == 'publish' && 
          needs.prepare.outputs.workspace != '' && 
          needs.export.outputs.published-exports != ''
        env:
          PUBLISHED_EXPORTS: ${{ needs.export.outputs.published-exports }}
        run: |
          mkdir -p published-exports
          cp context/meta.json published-exports/
          printf "%s\n" "$PUBLISHED_EXPORTS" > published-exports/published-exports.txt

      - name: Upload context artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-${{ github.run_id }}
          path: context/meta.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload published-exports artifact
        if: | 
          needs.route.outputs.command == 'publish' && 
          needs.prepare.outputs.workspace != '' && 
          needs.export.outputs.published-exports != ''
        uses: actions/upload-artifact@v4
        with:
          name: published-exports-pr-${{ needs.prepare.outputs.pr-number }}
          path: published-exports/
          if-no-files-found: error
          retention-days: 7

  checkBackstageCompatibility:
    name: Check workspace backstage compatibility
    needs:
      - route
      - prepare
      - detectChanges

    concurrency:
      group: checkBackstageCompatibility-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: true

    if: | 
      needs.route.outputs.command == 'publish' && 
      needs.prepare.outputs.overlay-branch != '' && 
      needs.prepare.outputs.workspace != '' && 
      needs.detectChanges.outputs.only-metadata-changed != 'true'

    uses: redhat-developer/rhdh-plugin-export-utils/.github/workflows/check-backstage-compatibility.yaml@main
    with:
      overlay-branch: ${{ needs.prepare.outputs.overlay-branch }}
      overlay-repo: ${{ needs.prepare.outputs.overlay-repo }}
      workspace-path: ${{ needs.prepare.outputs.workspace }}

  validateMetadataOnly:
    name: Validate metadata (metadata-only change)
    needs:
      - route
      - prepare
      - detectChanges

    concurrency:
      group: validateMetadataOnly-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: true

    if: | 
      needs.route.outputs.command == 'publish' && 
      needs.prepare.outputs.overlay-branch != '' && 
      needs.prepare.outputs.workspace != '' && 
      needs.detectChanges.outputs.only-metadata-changed == 'true'
    runs-on: ubuntu-latest

    outputs:
      metadata-validation-passed: ${{ steps.validate-metadata.outputs.validation-passed }}
      metadata-validation-errors: ${{ steps.validate-metadata.outputs.validation-errors }}
      metadata-validation-error-count: ${{ steps.validate-metadata.outputs.validation-error-count }}

    steps:
      - name: Checkout overlay repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.prepare.outputs.overlay-repo }}
          ref: ${{ needs.prepare.outputs.overlay-branch }}
          path: overlay-repo

      - name: Read source configuration
        id: source-config
        env:
          WORKSPACE: ${{ needs.prepare.outputs.workspace }}
        run: |
          source_json=$(cat "overlay-repo/${WORKSPACE}/source.json")
          plugins_repo=$(echo "${source_json}" | jq -r '.repo' | sed 's;https://github.com/;;')
          plugins_repo_ref=$(echo "${source_json}" | jq -r '."repo-ref"')
          plugins_repo_flat=$(echo "${source_json}" | jq -r '."repo-flat" // false')
          if [[ "${plugins_repo_flat}" == "true" ]]; then
            plugins_root="."
          else
            plugins_root="${WORKSPACE}"
          fi
          echo "plugins-repo=${plugins_repo}" >> $GITHUB_OUTPUT
          echo "plugins-repo-ref=${plugins_repo_ref}" >> $GITHUB_OUTPUT
          echo "plugins-root=${plugins_root}" >> $GITHUB_OUTPUT

          backstage_version=$(jq -r '.backstage' overlay-repo/versions.json)
          echo "backstage-version=${backstage_version}" >> $GITHUB_OUTPUT

          node_version=$(jq -r '.node' overlay-repo/versions.json)
          echo "node-version=${node_version}" >> $GITHUB_OUTPUT

      - name: Checkout plugins repository (flat)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.source-config.outputs.plugins-root == '.'
        with:
          repository: ${{ steps.source-config.outputs.plugins-repo }}
          ref: ${{ steps.source-config.outputs.plugins-repo-ref }}
          path: source-repo

      - name: Checkout plugins repository (workspace)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.source-config.outputs.plugins-root != '.'
        with:
          repository: ${{ steps.source-config.outputs.plugins-repo }}
          ref: ${{ steps.source-config.outputs.plugins-repo-ref }}
          sparse-checkout: |
            ${{ steps.source-config.outputs.plugins-root }}
          sparse-checkout-cone-mode: false
          path: source-repo

      - name: Setup Node.js ${{ steps.source-config.outputs.node-version }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ steps.source-config.outputs.node-version }}

      - name: Validate Catalog Metadata
        id: validate-metadata
        uses: redhat-developer/rhdh-plugin-export-utils/validate-metadata@main
        with:
          overlay-root: ${{ github.workspace }}/overlay-repo/${{ needs.prepare.outputs.workspace }}
          plugins-root: ${{ github.workspace }}/source-repo/${{ steps.source-config.outputs.plugins-root }}
          target-backstage-version: ${{ steps.source-config.outputs.backstage-version }}
          image-repository-prefix: ${{ format('ghcr.io/{0}', github.repository) }}

  add_publish_completion_comment:
    needs:
      - route
      - prepare
      - checkPRUpToDate
      - detectChanges
      - export
      - checkBackstageCompatibility
      - validateMetadataOnly

    concurrency:
      group: add_publish_completion_comment-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false

    permissions:
      statuses: write
      pull-requests: write

    if: |
      always() && 
      needs.route.outputs.command == 'publish' && 
      needs.prepare.outputs.overlay-branch != '' && 
      needs.prepare.outputs.workspace != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download compatibility report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backstage-compatibility-report
          path: ./

      - name: Add completion comment
        uses: actions/github-script@v7
        env:
          INPUT_OVERLAY_COMMIT: ${{ needs.prepare.outputs.overlay-commit }}
          INPUT_OVERLAY_REPO: ${{ needs.prepare.outputs.overlay-repo }}
          INPUT_OVERLAY_BRANCH: ${{ needs.prepare.outputs.overlay-branch }}
          INPUT_WORKSPACE: ${{ needs.prepare.outputs.workspace }}
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
          INPUT_PUBLISHED_EXPORTS: ${{ needs.export.outputs.published-exports }}
          INPUT_FAILED_EXPORTS: ${{ needs.export.outputs.failed-exports }}
          INPUT_COMMAND_NAME: ${{ needs.route.outputs.command }}
          INPUT_ONLY_METADATA_CHANGED: ${{ needs.detectChanges.outputs.only-metadata-changed }}
          INPUT_METADATA_VALIDATION_PASSED: ${{ needs.export.outputs.metadata-validation-passed || needs.validateMetadataOnly.outputs.metadata-validation-passed }}
          INPUT_METADATA_VALIDATION_ERRORS: ${{ needs.export.outputs.metadata-validation-errors || needs.validateMetadataOnly.outputs.metadata-validation-errors }}
          INPUT_METADATA_VALIDATION_ERROR_COUNT: ${{ needs.export.outputs.metadata-validation-error-count || needs.validateMetadataOnly.outputs.metadata-validation-error-count }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(core.getInput('pr_number'));
            const onlyMetadataChanged = core.getInput('only_metadata_changed') === 'true';
            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}'
            });
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}',
              filter: 'latest',
            });

            let success;
            let publishSuccess;
            if (onlyMetadataChanged) {
              success = jobs.data.jobs
                .filter(j => j.name.startsWith('Validate metadata') || j.name.startsWith('Detect'))
                .every(j => j.conclusion === 'success' || j.conclusion === 'skipped');
              publishSuccess = false;
            } else {
              success = jobs.data.jobs
                .filter(j => j.name.startsWith('Publish') || j.name.startsWith('export') || j.name.startsWith('Export') || j.name.startsWith('Check'))
                .every(j => j.conclusion === 'success');
              publishSuccess = jobs.data.jobs
                .filter(j => j.name.startsWith('Publish') || j.name.startsWith('export') || j.name.startsWith('Export'))
                .every(j => j.conclusion === 'success');
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: core.getInput('overlay_commit'),
              description: '${{ github.workflow }}',
              state: success ? 'success' : 'failure',
              target_url: workflowRun.data.html_url,
              context: core.getInput('command_name'),
            });

            let body;
            if (onlyMetadataChanged) {
              body = `[Publish workflow](${workflowRun.data.html_url}) - build skipped (only metadata files changed).`;
            } else {
              body = `[Publish workflow](${workflowRun.data.html_url}) has completed with ${ publishSuccess ? 'success' : 'failure' }.`;

              const publishedExports = core.getMultilineInput('published_exports');
              const failedExports = core.getMultilineInput('failed_exports');
              if (publishedExports.length + failedExports.length > 0) {
                if (failedExports.length > 0) {
                  body += '\n\n#### Publishing process\n';
                  body += `❌ Plugins with errors during export or container image publishing:`;
                  failedExports.forEach(line => {
                    body += `\n  - ${line}`;
                  });
                } else {
                  body += '\n\n#### Publishing process\n✅ Finished successfully.';
                }
                if (publishedExports.length > 0) {
                  body += `\n- Published container images:`;
                  publishedExports.forEach(line => {
                    body += `\n  - ${line}`;
                  });
                }
              }

              const reportPath = 'backstage-compatibility-report.md';
              if (fs.existsSync(reportPath)) {
                const reportContent = fs.readFileSync(reportPath, 'utf8');
                body = `${body}\n\n${reportContent}`;
              }
            }

            // Metadata validation results
            const metadataValidationPassed = core.getInput('metadata_validation_passed');
            const metadataValidationErrorCount = core.getInput('metadata_validation_error_count');
            const metadataValidationErrorsJson = core.getInput('metadata_validation_errors');

            if (metadataValidationPassed === 'true') {
              body += '\n\n#### Metadata Validation\n✅ All metadata files validated successfully.';
            } else if (metadataValidationErrorCount && metadataValidationErrorCount !== '0') {
              let metadataSection = '\n\n#### Metadata Validation\n';
              metadataSection += `❌ Found **${metadataValidationErrorCount}** validation error(s):\n\n`;
              metadataSection += '| File | Kind | Message |\n|------|------|---------|\n';
              
              try {
                const errors = JSON.parse(metadataValidationErrorsJson || '[]');
                for (const error of errors) {
                  const escapedMessage = (error.message || '').replace(/\|/g, '\\|');
                  metadataSection += `| ${error.file} | ${error.kind} | ${escapedMessage} |\n`;
                }
              } catch (e) {
                metadataSection += `| - | - | Failed to parse errors: ${metadataValidationErrorsJson} |\n`;
              }
              
              body += metadataSection;
            }

            // Check if E2E tests exist by looking for package.json in e2e-tests directory of the workspace
            if (publishSuccess) {
              const [repoOwner, repoName] = core.getInput('overlay_repo').split('/');
              try {
                await github.rest.repos.getContent({
                  owner: repoOwner,
                  repo: repoName,
                  path: `${core.getInput('workspace')}/e2e-tests/package.json`,
                  ref: core.getInput('overlay_branch'),
                });
                body += '\n\nRunning e2e tests\n/test e2e-ocp-helm';
              } catch {
                body += '\n\nNo E2E tests available for this workspace.';
              }
            }

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
    
  add_no_workspace_comment:
    needs:
      - route
      - prepare

    concurrency:
      group: add_no_workspace_comment-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false

    permissions:
      statuses: write
      pull-requests: write

    if: always() && needs.prepare.outputs.overlay-branch != '' && needs.prepare.outputs.workspace == ''
    runs-on: ubuntu-latest

    steps:
      - name: Report skipped command
        uses: actions/github-script@v7
        env:
          INPUT_OVERLAY_COMMIT: ${{ needs.prepare.outputs.overlay-commit }}
          INPUT_COMMAND_NAME: ${{ needs.route.outputs.command }}
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}

        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}'
            });

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: core.getInput('overlay_commit'),
              description: '${{ github.workflow }}',
              state: 'success',
              target_url: workflowRun.data.html_url,
              context: core.getInput('command_name'),
            });

            const body = `[PR action (\`/${core.getInput('command_name')}\`)](${workflowRun.data.html_url}) cancelled: PR doesn't touch only 1 workspace.`;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

  checkPRUpToDate:
    name: Checks whether the PR is up-to-date with versions.json
    needs:
      - route
      - prepare

    concurrency:
      group: checkPRUpToDate-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false
    
    permissions:
      statuses: write
      pull-requests: write
  
    if: |
      always() && 
      needs.route.outputs.command == 'publish' && 
      needs.prepare.outputs.overlay-branch != '' && 
      needs.prepare.outputs.workspace != ''
    runs-on: ubuntu-latest
    steps:
      - name: Add update check comment
        uses: actions/github-script@v7
        env:
          INPUT_TARGET_BRANCH: ${{ needs.prepare.outputs.target-branch }}
          INPUT_OVERLAY_BRANCH: ${{ needs.prepare.outputs.overlay-branch }}
          INPUT_OVERLAY_REPO: ${{ needs.prepare.outputs.overlay-repo }}
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const path = 'versions.json';
            const releaseBranch = core.getInput('target_branch');
            if (! releaseBranch?.startsWith('release-') && ! releaseBranch?.startsWith('main') ) {
              core.notice(`Current PR is not based on a release branch.`);
              return;
            }
            const { data: sourceFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: releaseBranch,
            });
            if (!('type' in sourceFile) || sourceFile.type !== 'file') {
              core.setFailed(`\`${path}\` is not a file on branch \`${releaseBranch}\``);
              return;
            }
            const sourceContent = Buffer.from(
              sourceFile.content,
              (Buffer.isEncoding(sourceFile.encoding) ? sourceFile.encoding : 'utf-8')
            ).toString('utf-8');
    
            const prRepository = core.getInput('overlay_repo');
            const prBranch = core.getInput('overlay_branch');
            const owner = prRepository.split('/')[0];
            const repo = prRepository.split('/')[1];
            const { data: targetFile } = await github.rest.repos.getContent({
              owner,
              repo,
              path,
              ref: prBranch,
            });
            if (!('type' in targetFile) || targetFile.type !== 'file') {
              core.warning(`\`${path}\` is not a file on branch ${prBranch}`);
              return;
            }
            const targetContent = Buffer.from(
              targetFile.content,
              (Buffer.isEncoding(targetFile.encoding) ? targetFile.encoding : 'utf-8')
            ).toString('utf-8');
      
            if (sourceContent !== targetContent) {
              core.setFailed(`PR not up-to-date with the release branch`);
              const body = `The \`versions.json\` file in your PR doesn't match the one in release branch ${releaseBranch}\nTry updating it by adding the \`/update-versions\` PR comment.`;
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
      
  updatePRWithVersions:
    name: Update versions on PR from release branch
    needs:
      - route
      - prepare

    concurrency:
      group: updatePRWithVersions-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: true
    
    if: needs.route.outputs.command == 'update-versions'
    uses: ./.github/workflows/update-prs-with-release-branch-commits.yaml
    with:
      force: true
      pr: ${{ needs.prepare.outputs.pr-number }}
      release-branch: ${{ needs.prepare.outputs.target-branch }}
    permissions:
      contents: write
      pull-requests: write
      attestations: write
      packages: write
      id-token: write
      statuses: write

  add_update_versions_completion_comment:
    needs:
      - route
      - prepare
      - updatePRWithVersions
      - prepare-for-auto-publish
      - auto-export-after-update

    concurrency:
      group: add_update_versions_completion_comment-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false
    
    permissions:
      statuses: write
      pull-requests: write

    if: always() && needs.route.outputs.command == 'update-versions' && needs.prepare.outputs.overlay-branch != '' && needs.prepare.outputs.workspace != ''
    runs-on: ubuntu-latest
    steps:
      - name: Add completion comment
        uses: actions/github-script@v7
        env:
          INPUT_OVERLAY_COMMIT: ${{ needs.prepare.outputs.overlay-commit }}
          INPUT_COMMAND_NAME: ${{ needs.route.outputs.command }}
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
          INPUT_SHOULD_PUBLISH: ${{ needs.prepare-for-auto-publish.outputs.should-publish }}
          INPUT_AUTO_EXPORT_RESULT: ${{ needs.auto-export-after-update.result }}
          INPUT_AUTO_EXPORT_PUBLISHED: ${{ needs.auto-export-after-update.outputs.published-exports }}
          INPUT_AUTO_EXPORT_FAILED: ${{ needs.auto-export-after-update.outputs.failed-exports }}

        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}'
            });
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}',
              filter: 'latest',
            });
            const success = jobs.data.jobs
              .filter(j => j.name.startsWith('Update versions on PR'))
              .every(j => j.conclusion === 'success');

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: core.getInput('overlay_commit'),
              description: '${{ github.workflow }}',
              state: success ? 'success' : 'failure',
              target_url: workflowRun.data.html_url,
              context: core.getInput('command_name'),
            });

            let body = `[Update Versions workflow](${workflowRun.data.html_url}) has completed with ${ success ? 'success' : 'failure' }.`;

            const shouldPublish = core.getInput('should_publish');
            const autoExportResult = core.getInput('auto_export_result');
            if (shouldPublish === 'true') {
              const exportSuccess = autoExportResult === 'success';
              body += `\n\n#### Auto-Publish\n`;
              body += exportSuccess
                ? '✅ Auto-publish triggered and completed successfully.'
                : '❌ Auto-publish triggered but failed.';
              const publishedExports = core.getMultilineInput('auto_export_published');
              const failedExports = core.getMultilineInput('auto_export_failed');
              if (failedExports.length > 0) {
                body += `\n- Failed exports:`;
                failedExports.forEach(line => { body += `\n  - ${line}`; });
              }
              if (publishedExports.length > 0) {
                body += `\n- Published container images:`;
                publishedExports.forEach(line => { body += `\n  - ${line}`; });
              }
            } else if (shouldPublish === 'false') {
              body += `\n\n_No changes detected — auto-publish skipped._`;
            }

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })    

  updatePRWithCommit:
    name: Update commit on PR from automatic discovery
    needs:
      - route
      - prepare

    concurrency:
      group: updatePRWithCommit-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: true
    
    if: needs.route.outputs.command == 'update-commit'
    uses: ./.github/workflows/update-plugins-repo-refs.yaml
    with:
      single-branch: ${{ needs.prepare.outputs.target-branch }}
      allow-workspace-addition: false
      pr-to-update: ${{ needs.prepare.outputs.pr-number }}
      workspace-path: ${{ needs.prepare.outputs.workspace }}

    permissions:
      contents: write
      pull-requests: write
      issues: read
      attestations: write
      packages: write
      id-token: write
      statuses: write

  add_update_commit_completion_comment:
    needs:
      - route
      - prepare
      - updatePRWithCommit
      - prepare-for-auto-publish
      - auto-export-after-update

    concurrency:
      group: add_update_commit_completion_comment-${{ github.ref_name }}-${{ inputs.pr-number || github.event.issue.number }}
      cancel-in-progress: false
    
    permissions:
      statuses: write
      pull-requests: write

    if: | 
      always() && 
      needs.route.outputs.command == 'update-commit' && 
      needs.prepare.outputs.overlay-branch != '' && 
      needs.prepare.outputs.workspace != ''
    runs-on: ubuntu-latest
    steps:
      - name: Add completion comment
        uses: actions/github-script@v7
        env:
          INPUT_OVERLAY_COMMIT: ${{ needs.prepare.outputs.overlay-commit }}
          INPUT_COMMAND_NAME: ${{ needs.route.outputs.command }}
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
          INPUT_SHOULD_PUBLISH: ${{ needs.prepare-for-auto-publish.outputs.should-publish }}
          INPUT_AUTO_EXPORT_RESULT: ${{ needs.auto-export-after-update.result }}
          INPUT_AUTO_EXPORT_PUBLISHED: ${{ needs.auto-export-after-update.outputs.published-exports }}
          INPUT_AUTO_EXPORT_FAILED: ${{ needs.auto-export-after-update.outputs.failed-exports }}

        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}'
            });
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: '${{ github.run_id }}',
              filter: 'latest',
            });
            const success = jobs.data.jobs
              .filter(j => j.name.startsWith('Update commit on PR'))
              .every(j => j.conclusion === 'success' || j.conclusion === 'skipped');

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: core.getInput('overlay_commit'),
              description: '${{ github.workflow }}',
              state: success ? 'success' : 'failure',
              target_url: workflowRun.data.html_url,
              context: core.getInput('command_name'),
            });

            let body = `[Update Commit workflow](${workflowRun.data.html_url}) has completed with ${ success ? 'success' : 'failure' }.`;

            const shouldPublish = core.getInput('should_publish');
            const autoExportResult = core.getInput('auto_export_result');
            if (shouldPublish === 'true') {
              const exportSuccess = autoExportResult === 'success';
              body += `\n\n#### Auto-Publish\n`;
              body += exportSuccess
                ? '✅ Auto-publish triggered and completed successfully.'
                : '❌ Auto-publish triggered but failed.';
              const publishedExports = core.getMultilineInput('auto_export_published');
              const failedExports = core.getMultilineInput('auto_export_failed');
              if (failedExports.length > 0) {
                body += `\n- Failed exports:`;
                failedExports.forEach(line => { body += `\n  - ${line}`; });
              }
              if (publishedExports.length > 0) {
                body += `\n- Published container images:`;
                publishedExports.forEach(line => { body += `\n  - ${line}`; });
              }
            } else if (shouldPublish === 'false') {
              body += `\n\n_No changes detected — auto-publish skipped._`;
            }

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

  prepare-for-auto-publish:
    name: Check if update caused a change
    needs:
      - route
      - prepare
      - updatePRWithCommit
      - updatePRWithVersions
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.workspace != '' &&
      (
        (needs.route.outputs.command == 'update-commit' &&
         needs.updatePRWithCommit.result == 'success') ||
        (needs.route.outputs.command == 'update-versions' &&
         needs.updatePRWithVersions.result == 'success')
      )
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      overlay-commit: ${{ steps.check.outputs.overlay-commit }}
    steps:
      - name: Check if PR HEAD changed
        id: check
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
          INPUT_ORIGINAL_COMMIT: ${{ needs.prepare.outputs.overlay-commit }}
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(core.getInput('pr_number')),
            });
            const newCommit = pr.data.head.sha;
            const changed = newCommit !== core.getInput('original_commit');
            core.setOutput('should-publish', String(changed));
            core.setOutput('overlay-commit', newCommit);
            core.info(`Original commit: ${core.getInput('original_commit')}`);
            core.info(`New commit: ${newCommit}`);
            core.info(`Changed: ${changed}`);

  auto-export-after-update:
    name: Auto-publish after update
    needs:
      - prepare
      - prepare-for-auto-publish
    if: needs.prepare-for-auto-publish.outputs.should-publish == 'true'

    uses: redhat-developer/rhdh-plugin-export-utils/.github/workflows/export-workspaces-as-dynamic.yaml@main
    with:
      overlay-branch: ${{ needs.prepare.outputs.overlay-branch }}
      overlay-repo: ${{ needs.prepare.outputs.overlay-repo }}
      workspace-path: ${{ needs.prepare.outputs.workspace }}
      publish-container: true
      image-repository-prefix: ${{ format('ghcr.io/{0}', github.repository) }}
      image-tag-prefix: ${{ format('pr_{0}__', needs.prepare.outputs.pr-number) }}
      image-registry-user: ${{ github.actor }}

    secrets:
      image-registry-password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write
      attestations: write
      packages: write
      id-token: write
