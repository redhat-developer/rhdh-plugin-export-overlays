name: Publish RHDH Release Dynamic Plugin Images 
on:
  workflow_call:

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    name: Prepare
    outputs:
      last-published-commit: ${{ steps.get-last-published-commit.outputs.last-published-commit }}

    steps:
      - name: Get last published commit
        id: get-last-published-commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_RELEASE_BRANCH: ${{ github.ref_name }}      
        with:
          script: |
            core.info(`Getting latest commit on branch ${core.getInput('release_branch')}`);

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const workflowId = currentRun.data.workflow_id;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch: core.getInput('release_branch'),
              status: 'success',
              per_page: 10,
              exclude_pull_requests: true,
            });

            for (const run of runs.data.workflow_runs) {
              if (context.payload.commits.some(c => c.id === run.head_sha)) {
                core.info(`Skipping run ${run.id} for commit ${run.head_sha}, it's part of the push`);
                continue;
              }

              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                filter: 'latest',
              });

              const exportJobs = jobs.data.jobs.filter(j => j.name.startsWith('export /'));
              if (exportJobs.length > 0 && exportJobs.every(j => j.conclusion === 'success')) {
                core.info(`Last published commit to compare with: ${run.head_sha}`);
                core.setOutput('last-published-commit', run.head_sha);
                return;
              }
              core.info(`Skipping run ${run.id} for commit ${run.head_sha}: export jobs not all successful`);
            }

            core.info('Last published commit not found');
            core.setOutput('last-published-commit', '');
            
  export:
    uses: redhat-developer/rhdh-plugin-export-utils/.github/workflows/export-workspaces-as-dynamic.yaml@main
    needs:
      - prepare

    with:
      publish-container: true
      image-repository-prefix: ${{ format('ghcr.io/{0}', github.repository) }}
      last-publish-commit: ${{ needs.prepare.outputs.last-published-commit }}
      # use empty prefix so that we will prepend bs_1.yy.z__ instead of next__
      image-tag-prefix: ${{ '' }}
      image-registry-user: ${{ github.actor }}

    secrets:
      image-registry-password: ${{ secrets.GITHUB_TOKEN }}
  
    permissions:
      contents: write
      attestations: write
      packages: write
      id-token: write

  instrument:
    name: Instrument plugin images for E2E coverage
    needs:
      - export
    # Build coverage images only when something was actually published.
    if: |
      always() &&
      needs.export.result == 'success' &&
      needs.export.outputs.published-exports != ''
    runs-on: ubuntu-latest
    # Coverage instrumentation must never affect the release. The run step is
    # already non-fatal per workspace, but an infra failure in an earlier step
    # (checkout, registry login, node setup) would otherwise fail the job and
    # turn the publish workflow — and its README status badge — red even though
    # the artifacts published fine. continue-on-error keeps the run green; the
    # job still shows its own status, and instrumentation problems surface as
    # ::warning:: annotations.
    continue-on-error: true
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The job only reads files and pushes images via podman + GITHUB_TOKEN;
          # it never uses the git credential, so don't persist it.
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$REGISTRY_PASSWORD" | podman login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Instrument and publish coverage images for rolled-out workspaces
        env:
          PUBLISHED_EXPORTS: ${{ needs.export.outputs.published-exports }}
        run: |
          # Build the __coverage variant of each just-published image for every
          # workspace already set up for overlay E2E coverage (i.e. has a
          # coverage-anchors/ directory). The nightly deploys RELEASED images,
          # so the instrumented variant must exist at publish time for the
          # nightly to collect coverage from it. This reuses the exact script
          # the PR /publish flow runs; each workspace run instruments only the
          # images that match its own metadata (others are skipped fast, with
          # no image pull).
          #
          # Images are built for every rolled-out workspace, including those the
          # nightly currently resolves via {{inherit}} — their ghcr images
          # aren't consumed until the Phase 2 coverage periodic forces ghcr, but
          # building them now keeps the producer ready ahead of that consumer.
          #
          # A failure never blocks the release (exit 0), but it is surfaced as a
          # workflow warning so a silently-broken pipeline — which would starve
          # the nightly of coverage — is noticeable in the run summary.
          shopt -s nullglob
          rolled_out=0
          failed=0
          for anchor_dir in workspaces/*/coverage-anchors; do
            ws="$(dirname "$anchor_dir")"
            [[ -d "$ws/e2e-tests" ]] || continue
            rolled_out=$((rolled_out + 1))
            echo "=== Instrumenting $ws ==="
            echo "$PUBLISHED_EXPORTS" | ./scripts/instrument-plugin.sh "$ws" \
              || { echo "::warning title=coverage-instrumentation::failed for $ws"; failed=$((failed + 1)); }
          done
          if [[ "$rolled_out" -eq 0 ]]; then
            echo "[INFO] No rolled-out workspaces (coverage-anchors/) to instrument."
          elif [[ "$failed" -gt 0 ]]; then
            echo "::warning title=coverage-instrumentation::$failed of $rolled_out workspace(s) failed to instrument; nightly coverage may be stale"
          fi
