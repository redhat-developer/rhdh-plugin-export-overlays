name: PR Coverage Auto-Trigger

# Automatically run the E2E coverage pipeline on every PR open/sync.
# Satisfies the PR Checks coverage requirement without forcing the dev to
# remember to type '/coverage-test' on every push. The slash command stays
# available as a manual re-trigger when something flakes.
#
# Uses 'pull_request_target' (not 'pull_request') so GITHUB_TOKEN has the
# 'actions: write' permission needed to dispatch the downstream workflow,
# including for PRs from forks. This job intentionally does NOT check out
# any PR code — it only calls the dispatch API with metadata from the
# event payload, so the usual 'pwn request' caveats don't apply.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-coverage-trigger-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  dispatch:
    name: Dispatch E2E coverage workflow
    runs-on: ubuntu-latest
    # Skip draft PRs and PRs without any workspaces/ change — saves a noisy
    # workflow run that the downstream 'detect-workspaces' job would have
    # immediately filtered out.
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Dispatch e2e-ocp-helm-pr.yaml
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'e2e-ocp-helm-pr.yaml',
              ref: pr.base.ref,
              inputs: {
                'pr-number': String(pr.number),
                'overlay-commit': pr.head.sha,
                'overlay-repo': pr.head.repo.full_name,
                'overlay-branch': pr.head.ref,
                'target-branch': pr.base.ref,
                'workspace': '',
              },
            });
