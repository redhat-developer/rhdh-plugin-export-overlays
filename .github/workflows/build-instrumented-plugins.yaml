name: Build Instrumented Plugin Images for E2E Coverage

on:
  push:
    branches: [main]
    paths:
      - 'workspaces/*/source.json'

  workflow_dispatch:
    inputs:
      workspace:
        description: 'Single workspace to instrument (leave empty for all with E2E tests)'
        type: string
        required: false
      force-rebuild:
        description: 'Force rebuild even if instrumented image already exists'
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-workspaces:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect workspaces to instrument
        id: detect
        env:
          INPUT_WORKSPACE: ${{ inputs.workspace }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          WORKSPACES=()

          if [[ -n "$INPUT_WORKSPACE" ]]; then
            # Validate: only allow alphanumeric, hyphens, underscores
            if [[ ! "$INPUT_WORKSPACE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "ERROR: Invalid workspace name: $INPUT_WORKSPACE" >&2
              exit 1
            fi
            WORKSPACES=("$INPUT_WORKSPACE")
          elif [[ "$EVENT_NAME" == "push" ]]; then
            # On first push (new branch or initial commit), PUSH_BEFORE is the zero SHA.
            # git diff with zero SHA fails, so fall back to instrumenting all workspaces.
            if [[ "$PUSH_BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              echo "Initial push detected (zero SHA), instrumenting all workspaces with e2e-tests"
              for dir in workspaces/*/e2e-tests; do
                WS=$(echo "$dir" | cut -d'/' -f2)
                WORKSPACES+=("$WS")
              done
            else
              # Detect all source.json changes across the entire push (handles multi-commit merges)
              CHANGED=$(git diff --name-only "${PUSH_BEFORE}..HEAD" -- 'workspaces/*/source.json' 2>/dev/null || true)
              for file in $CHANGED; do
                WS=$(echo "$file" | cut -d'/' -f2)
                WORKSPACES+=("$WS")
              done
            fi
          else
            # Manual dispatch without specific workspace: instrument all with e2e-tests
            for dir in workspaces/*/e2e-tests; do
              WS=$(echo "$dir" | cut -d'/' -f2)
              WORKSPACES+=("$WS")
            done
          fi

          # Filter: only workspaces that have e2e-tests AND source.json
          VALID=()
          for ws in "${WORKSPACES[@]}"; do
            if [[ -d "workspaces/$ws/e2e-tests" ]] && [[ -f "workspaces/$ws/source.json" ]]; then
              VALID+=("$ws")
            else
              echo "Skipping $ws (no e2e-tests/ or source.json)"
            fi
          done

          if [[ ${#VALID[@]} -eq 0 ]]; then
            echo "No workspaces to instrument"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${VALID[@]}" | jq -R . | jq -sc .)
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "Workspaces to instrument: ${VALID[*]}"
          fi

  instrument:
    needs: detect-workspaces
    if: needs.detect-workspaces.outputs.matrix != '[]'
    strategy:
      matrix:
        workspace: ${{ fromJson(needs.detect-workspaces.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read source.json metadata
        id: meta
        env:
          WORKSPACE: ${{ matrix.workspace }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          SOURCE_JSON="workspaces/${WORKSPACE}/source.json"
          REPO_REF=$(jq -r '.["repo-ref"]' "$SOURCE_JSON")
          REPO_URL=$(jq -r '.repo' "$SOURCE_JSON")
          SLUG=$(echo "$REPO_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
          REF_SHORT="${REPO_REF:0:12}"

          # Find the frontend plugin package name from metadata
          PLUGIN_IMAGE_NAME=""
          for meta_file in "workspaces/${WORKSPACE}/metadata"/*.yaml; do
            [ -e "$meta_file" ] || continue
            ROLE=$(yq -r '.spec.backstage.role // ""' "$meta_file")
            if [[ "$ROLE" == "frontend-plugin" ]]; then
              PKG=$(yq -r '.spec.packageName // ""' "$meta_file")
              if [[ -n "$PKG" && "$PKG" != "null" ]]; then
                PLUGIN_IMAGE_NAME=$(echo "$PKG" | sed 's|^@||; s|/|-|')
                break
              fi
            fi
          done

          if [[ -z "$PLUGIN_IMAGE_NAME" ]]; then
            echo "No frontend plugin found in metadata for ${WORKSPACE}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IMAGE_REPO="ghcr.io/${GITHUB_REPO}/${PLUGIN_IMAGE_NAME}-coverage"
          IMAGE_TAG="ref-${REF_SHORT}"
          IMAGE_REF="${IMAGE_REPO}:${IMAGE_TAG}"

          echo "repo-ref=$REPO_REF" >> "$GITHUB_OUTPUT"
          echo "repo-url=$REPO_URL" >> "$GITHUB_OUTPUT"
          echo "repo-slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "ref-short=$REF_SHORT" >> "$GITHUB_OUTPUT"
          echo "plugin-image-name=$PLUGIN_IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image-repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image-ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "  Workspace:    ${WORKSPACE}"
          echo "  Source ref:   $REPO_REF"
          echo "  Plugin:       $PLUGIN_IMAGE_NAME"
          echo "  Image:        $IMAGE_REF"

      - name: Check if instrumented image already exists
        if: steps.meta.outputs.skip != 'true'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          PLUGIN_IMAGE_NAME: ${{ steps.meta.outputs.plugin-image-name }}
          IMAGE_TAG: ${{ steps.meta.outputs.image-tag }}
          IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: |
          PACKAGE_PATH="${GITHUB_REPO}/${PLUGIN_IMAGE_NAME}-coverage"
          PACKAGE_PATH_ENCODED=$(echo "$PACKAGE_PATH" | sed 's|/|%2F|g')

          EXISTS=$(gh api "/orgs/${REPO_OWNER}/packages/container/${PACKAGE_PATH_ENCODED}/versions" \
            --jq "[.[] | select(.metadata.container.tags[] == \"$IMAGE_TAG\")] | length" 2>/dev/null || echo "0")

          if [[ "$EXISTS" -gt 0 ]] && [[ "$FORCE_REBUILD" != "true" ]]; then
            echo "Instrumented image already exists: $IMAGE_REF"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Instrumented image not found, will build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Node.js version
        if: steps.meta.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        id: node-version
        run: echo "version=$(jq -r '.node' versions.json)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.meta.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - name: Build instrumented plugin
        if: steps.meta.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        env:
          WORKSPACE: ${{ matrix.workspace }}
        run: ./scripts/instrument-plugin.sh "$WORKSPACE"

      - name: Setup ORAS CLI
        if: steps.meta.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        uses: oras-project/setup-oras@5c0b487ce3fe0ce3ab0d034e63669e426e294e4d # v1.2.2
        with:
          version: 1.2.2

      - name: Log in to GitHub Container Registry
        if: steps.meta.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish instrumented OCI image
        if: steps.meta.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        env:
          WORKSPACE: ${{ matrix.workspace }}
          IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
        run: |
          BUNDLE_DIR=".instrumented/${WORKSPACE}"

          if [[ ! -d "$BUNDLE_DIR" ]]; then
            echo "ERROR: Instrumented bundle not found at $BUNDLE_DIR"
            exit 1
          fi

          TAR_FILE=".instrumented/${WORKSPACE}.tar.gz"
          tar -czf "$TAR_FILE" -C "$BUNDLE_DIR" .

          oras push "$IMAGE_REF" \
            --artifact-type "application/vnd.rhdh.dynamic-plugin.coverage.v1" \
            "$TAR_FILE:application/gzip"

          echo "Published instrumented image: $IMAGE_REF"

      - name: Write job summary
        if: always() && steps.meta.outputs.skip != 'true'
        env:
          WORKSPACE: ${{ matrix.workspace }}
          REPO_REF: ${{ steps.meta.outputs.repo-ref }}
          REPO_SLUG: ${{ steps.meta.outputs.repo-slug }}
          PLUGIN_IMAGE_NAME: ${{ steps.meta.outputs.plugin-image-name }}
          IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
          IMAGE_EXISTS: ${{ steps.check.outputs.exists }}
        run: |
          {
            echo "### Instrumented Plugin: ${WORKSPACE}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Source ref | \`${REPO_REF}\` |"
            echo "| Source repo | ${REPO_SLUG} |"
            echo "| Plugin | ${PLUGIN_IMAGE_NAME} |"
            echo "| Image | \`${IMAGE_REF}\` |"
            if [[ "$IMAGE_EXISTS" == "true" ]]; then
              echo "| Status | Skipped (image already exists) |"
            else
              echo "| Status | Built and published |"
            fi
            echo ""
            echo "**Codecov flag:** \`e2e-${WORKSPACE}\`"
          } >> "$GITHUB_STEP_SUMMARY"
