name: E2E Code Quality

on:
  pull_request:
    branches:
      - main
      - 'release-*'
    paths:
      - 'workspaces/*/e2e-tests/**'

concurrency:
  group: e2e-code-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e-code-quality:
    name: E2E Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Discover changed e2e-tests workspaces and run checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- 'workspaces/*/e2e-tests/**')
          mapfile -t WORKSPACES < <(echo "$CHANGED_FILES" | sed -n 's|^workspaces/\([^/]*\)/e2e-tests/.*|\1|p' | sort -u)

          if [[ ${#WORKSPACES[@]} -eq 0 ]]; then
            echo "No e2e-tests workspaces changed. Nothing to validate."
            exit 0
          fi

          echo "Discovered workspaces with e2e-tests changes:"
          printf '%s\n' "${WORKSPACES[@]}"
          echo ""

          bash scripts/e2e-code-quality.sh "${WORKSPACES[@]}"
