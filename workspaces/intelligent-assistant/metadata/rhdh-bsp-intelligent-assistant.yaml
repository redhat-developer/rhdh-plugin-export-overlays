apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: red-hat-developer-hub-backstage-plugin-intelligent-assistant
  namespace: rhdh
  title: "Intelligent Assistant Frontend"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://issues.redhat.com/browse/RHDHBUGS
      title: "Report issues here. Note: Customers of Red Hat Developer Hub should raise a Red Hat support case instead."
    - title: Source Code
      url: https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/intelligent-assistant/plugins/intelligent-assistant
  annotations:
    backstage.io/source-location: url:https://github.com/redhat-developer/rhdh-plugins/tree/main/workspaces/intelligent-assistant/plugins/intelligent-assistant
  tags: []
spec:
  packageName: "@red-hat-developer-hub/backstage-plugin-intelligent-assistant"
  dynamicArtifact: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-intelligent-assistant:bs_1.52.0__3.0.3!red-hat-developer-hub-backstage-plugin-intelligent-assistant
  version: 3.0.3
  backstage:
    role: frontend-plugin
    supportedVersions: 1.52.0
  author: Red Hat
  support: generally-available
  lifecycle: active
  partOf:
    - intelligent-assistant
  appConfigExamples:
    - title: Default configuration
      content:
        intelligent-assistant:
          # OPTIONAL: Custom users prompts displayed to users
          # If not provided, the plugin uses built-in default prompts
          prompts:
            - title: 'Getting Started with Red Hat Developer Hub'
              message: Can you guide me through the first steps to start using Developer Hub as a developer, like exploring the Software Catalog and adding my service?
        dynamicPlugins:
          frontend:
            red-hat-developer-hub.backstage-plugin-intelligent-assistant:
              translationResources:
                - importName: lightspeedTranslations
                  module: Alpha
                  ref: intelligentAssistantTranslationRef
              dynamicRoutes:
                - path: /intelligent-assistant
                  importName: LightspeedPage
              mountPoints:
                - mountPoint: application/listener
                  importName: LightspeedFAB
                - mountPoint: application/provider
                  importName: LightspeedDrawerProvider
                - mountPoint: application/internal/drawer-state
                  importName: LightspeedDrawerStateExposer
                  config:
                    id: intelligent-assistant
                - mountPoint: application/internal/drawer-content
                  importName: LightspeedChatContainer
                  config:
                    id: intelligent-assistant
                    priority: 100
