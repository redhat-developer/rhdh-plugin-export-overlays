plugins:
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-homepage
    enabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-homepage: {}
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-homepage-backend:bs_1.51.0__0.2.1!red-hat-developer-hub-backstage-plugin-homepage-backend
    enabled: true
    pluginConfig:
      homepage:
        defaultWidgets:
          - id: onboarding-section
            ref: onboarding-section
            props:
              title: Onboarding section
          - id: entity-section
            ref: entity-section
            props:
              title: Entity section
          - if:
              groups: [group:default/admins]
            children:
              - id: template-section
                ref: template-section
                props:
                  title: Template section
              - id: quickaccess-card
                ref: quickaccess-card
                props:
                  title: Quick Access
          - if:
              groups: [group:default/developers]
            children:
              - id: recently-visited
                ref: recently-visited-card
                props:
                  title: Recently Visited
              - id: top-visited
                ref: top-visited-card
                props:
                  title: Top Visited
