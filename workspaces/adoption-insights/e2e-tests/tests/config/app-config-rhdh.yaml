catalog:
  rules:
    - allow:
        [
          API,
          Component,
          User,
          Group,
          Location,
          Resource,
          System,
          Template,
          Plugin,
          Package,
        ]
  locations:
    - type: url
      target: https://github.com/janus-qe/RHDH-scorecard-plugin-test/blob/main/rhdh-catalog.yaml
    - type: url
      target: https://github.com/janus-qe/tech_docs_overlay_adoptionInsights/blob/master/catalog-info.yaml

permission:
  enabled: true
  rbac:
    # policies-csv-file: /Users/dsantra/Documents/rhdh/rbac-policy.csv
    pluginsWithPermission:
      - catalog
      - permission
    admin:
      superUsers:
        - name: user:default/test1
      users:
        - name: user:default/test1

integrations:
  # Plugin: GitHub
  github:
    - host: github.com
      apps:
        - appId: ${GITHUB_APP_APP_ID}
          clientId: ${GITHUB_APP_CLIENT_ID}
          clientSecret: ${GITHUB_APP_CLIENT_SECRET}
          webhookUrl: ${GITHUB_APP_WEBHOOK_URL}
          webhookSecret: ${GITHUB_APP_WEBHOOK_SECRET}
          privateKey: |
            ${GITHUB_APP_PRIVATE_KEY}
