# rhdh app config file
# this file is used to merge with the default values of the rhdh app config

app:
  title: RHDH Orchestrator Test Instance
backend:
  reading:
    allow:
      - host: raw.githubusercontent.com
permission:
  enabled: true
  rbac:
    pluginsWithPermission:
      - orchestrator
    admin:
      users:
        - name: user:default/test1
orchestrator:
  dataIndexService:
    url: ${SONATAFLOW_DATA_INDEX_URL}
catalog:
  rules:
    - allow: [Template, Component, System, Group, Resource, Location, API, User]
  locations:
    - type: url
      target: ${CATALOG_TEMPLATES_BASE_URL}/greeting.yaml
      rules:
        - allow: [Template]
    - type: url
      target: ${CATALOG_TEMPLATES_BASE_URL}/greeting_w_component.yaml
      rules:
        - allow: [Template]
    - type: url
      target: ${CATALOG_TEMPLATES_BASE_URL}/yamlgreet.yaml
      rules:
        - allow: [Template]
