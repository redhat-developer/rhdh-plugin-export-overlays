apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: greetingComponent
  title: Greeting Test Picker
  description: Greeting Picker workflow — creates a Component entity and runs the greeting workflow against it
  annotations:
    orchestrator.io/workflows: '["greeting"]'
    sonataflow.org/description: YAML based greeting workflow
    sonataflow.org/expressionLang: jq
    sonataflow.org/version: "1.0"
  tags:
    - orchestrator
spec:
  type: service
  dependsOn:
    - component: default/red-hat-developer-hub

  parameters:
    - title: Provide workflow inputs
      required:
        - language
        - name
      properties:
        language:
          title: Language
          type: string
          enum:
            - 'English'
            - 'Spanish'
          default: 'English'
        name:
          title: Name
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'

  steps:
    - id: register
      name: Register Component in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/testetson22/greeting_54mjks/blob/main/templates/greeting/skeleton/catalog-info.yaml

    - id: runWorkflow
      name: Run greeting workflow
      action: orchestrator:workflow:run
      input:
        workflow_id: greeting
        target_entity: ${{ steps.register.output.entityRef }}
        parameters:
          language: ${{ parameters.language }}
          name: ${{ parameters.name }}

  output:
    links:
      - title: View in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Open workflow run
        url: ${{ steps.runWorkflow.output.instanceUrl }}
