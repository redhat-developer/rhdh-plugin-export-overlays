apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: greet
  title: Greeting
  description: Simple YAML-based greeting workflow template
  annotations:
    orchestrator.io/workflows: '["greeting"]'
  tags:
    - orchestrator
spec:
  owner: red-hat-developer-hub-authors
  system: red-hat-developer-hub
  type: service

  parameters:
    - title: Provide workflow inputs
      required:
        - language
      properties:
        language:
          title: Language
          type: string
          enum:
            - 'English'
            - 'Spanish'
          default: 'English'
        name:
          title: Name
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'

  steps:
    - id: runWorkflow
      name: Run workflow
      action: orchestrator:workflow:run
      input:
        workflow_id: greeting
        parameters:
          language: ${{ parameters.language }}
          name: ${{ parameters.name }}

  output:
    links:
      - title: Open workflow run
        url: "${{ steps.runWorkflow.output.instanceUrl }}"
