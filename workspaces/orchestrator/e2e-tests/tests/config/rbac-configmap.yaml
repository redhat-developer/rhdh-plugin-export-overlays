kind: ConfigMap
apiVersion: v1
metadata:
  name: rbac-policy
data:
  rbac-policy.csv: |
    p, role:default/workflowAdmin, orchestrator.workflow, read, allow
    p, role:default/workflowAdmin, orchestrator.workflowAdminView, read, allow
    g, group:default/admins, role:default/workflowAdmin
    g, group:default/test1, role:default/workflowAdmin
