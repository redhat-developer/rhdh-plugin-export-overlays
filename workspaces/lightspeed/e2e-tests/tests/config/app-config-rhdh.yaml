# RHDH app config merged at deploy. Do not use legacy lightspeed.servers (Road-Core era).
# LCS + Llama Stack run as the lightspeed-core sidecar when global.lightspeed.enabled is true.

permission:
  enabled: true
  rbac:
    pluginsWithPermission:
      - catalog
      - permission
      - lightspeed
    admin:
      superUsers:
        - name: user:default/test1

backend:
  actions:
    pluginSources:
      - scaffolder-mcp-extras
      - software-catalog-mcp-extras
      - techdocs-mcp-extras
  csp:
    upgrade-insecure-requests: false
    img-src:
      - "'self'"
      - "data:"
      - https://avatars.githubusercontent.com
      - https://secure.gravatar.com
    script-src:
      - "'self'"
      - "'unsafe-eval'"
      - https://cdn.jsdelivr.net

mcpActions:
  namespacedToolNames: false

lightspeed:
  notebooks:
    enabled: true
    queryDefaults:
      model: ${NOTEBOOK_DEFAULT_MODEL}
      provider_id: ${NOTEBOOK_PROVIDER}
  servicePort: 8080
  mcpServers:
    - name: mcp-integration-tools
      token: ${MCP_TOKEN}
    # Intentionally no token: used by e2e to verify "token required" status.
    - name: mcp-token-required-tools
    # Extra configured server for multi-row MCP settings coverage.
    - name: mcp-observability-tools
      token: ${MCP_TOKEN}
  prompts:
    - title: Getting Started with Red Hat Developer Hub
      message: Can you guide me through the first steps to start using Developer Hub as a developer, like exploring the Software Catalog and adding my service?
